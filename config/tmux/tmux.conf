# ============================================
# General Settings
# ============================================
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",tmux-256color:Tc"
set -ga terminal-overrides ",xterm-ghostty:Tc"
set -ga terminal-overrides ",xterm-256color:Smulx=\E[4::%p1%dm"
set -ga terminal-overrides ",tmux-256color:Smulx=\E[4::%p1%dm"
set -ga terminal-overrides ",xterm-ghostty:Smulx=\E[4::%p1%dm"
set -ga terminal-overrides ",xterm-256color:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m"
set -ga terminal-overrides ",tmux-256color:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m"
set -ga terminal-overrides ",xterm-ghostty:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m"
set -g extended-keys on
set -g allow-passthrough on
set -g mouse on
set -g history-limit 50000
set -g focus-events on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -s escape-time 0

# Prefix key - Ctrl+\
unbind-key C-b
set -g prefix 'C-\'
bind-key 'C-\' send-prefix

# Window renaming handled by shell chpwd hook (reduces flashing)
set -g automatic-rename off
set -g allow-rename on

# ============================================
# Keybindings
# ============================================
# Shift+Left/Right to switch windows (tabs)
bind -n S-Left previous-window
bind -n S-Right next-window

# Cmd+T style - new window
bind -n M-t new-window -c "#{pane_current_path}"

# Easier splits (like iTerm2)
bind -n M-d split-window -h -c "#{pane_current_path}"
bind -n M-D split-window -v -c "#{pane_current_path}"

# Navigate panes with Alt+Arrow
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Close pane/window with Cmd+W style
bind -n M-w kill-pane

# Rename window with Cmd+, style
bind -n M-, command-prompt -I "#W" "rename-window '%%'"

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Ctrl+Tab / Ctrl+Shift+Tab to switch windows
bind -n C-Tab next-window
bind -n C-S-Tab previous-window

# ============================================
# Emacs-style C-x bindings (smart passthrough)
# ============================================

# C-x: if in Emacs, send C-x; otherwise enter cx-keys table
# Uses tmux format comparison (-F) with case-insensitive match (/i) for macOS Emacs-arm64-11
bind -n C-x if-shell -F "#{m/i:*emacs*,#{pane_current_command}}" "send-keys C-x" "switch-client -T cx-keys"

# Key table for C-x prefix (when NOT in Emacs)
bind -T cx-keys 2 split-window -h -c "#{pane_current_path}"  # side-by-side
bind -T cx-keys 3 split-window -v -c "#{pane_current_path}"  # stacked
bind -T cx-keys 0 kill-pane                                  # close pane
bind -T cx-keys 1 kill-pane -a                                # close other panes
bind -T cx-keys k kill-pane                                  # kill (Emacs kill-buffer style)

# C-x o = visual pane selection with numbers + letter keys
bind -T cx-keys o run-shell -b "tmux display-panes -d 2000" \; switch-client -T pane-select

# Pane select - home row letters map to pane indices (a=1, s=2, d=3...)
bind -T pane-select a select-pane -t :.1
bind -T pane-select s select-pane -t :.2
bind -T pane-select d select-pane -t :.3
bind -T pane-select f select-pane -t :.4
bind -T pane-select g select-pane -t :.5
bind -T pane-select h select-pane -t :.6
bind -T pane-select j select-pane -t :.7
bind -T pane-select k select-pane -t :.8
bind -T pane-select l select-pane -t :.9
# Also allow digit keys
bind -T pane-select 1 select-pane -t :.1
bind -T pane-select 2 select-pane -t :.2
bind -T pane-select 3 select-pane -t :.3
bind -T pane-select 4 select-pane -t :.4
bind -T pane-select 5 select-pane -t :.5
bind -T pane-select 6 select-pane -t :.6
bind -T pane-select 7 select-pane -t :.7
bind -T pane-select 8 select-pane -t :.8
bind -T pane-select 9 select-pane -t :.9

# Escape from key tables
bind -T cx-keys Escape switch-client -T root
bind -T pane-select Escape switch-client -T root

# Pass through C-x C-x to shell (readline)
bind -T cx-keys C-x send-keys C-x

# Style pane number display
set -g display-panes-colour "#6c7086"
set -g display-panes-active-colour "#74c7ec"
set -g display-panes-time 2000

# ============================================
# Status Bar - VS Code Dark+
# ============================================
set -g status on
set -g status-position bottom
set -g status-style "bg=default,fg=#cdd6f4"
set -g status-left "#[fg=#1e1e2e,bg=#74c7ec,bold] #S #[fg=#74c7ec,bg=default] "
set -g status-left-length 30
set -g status-right "#[fg=#6c7086]%H:%M #[fg=#74c7ec]│ #[fg=#89b4fa]%b %d "
set -g status-right-length 50

# Window status (inactive tabs pulse when Claude needs input)
setw -g window-status-format "#{?#{==:#{@claude-pulse},on},#{?#{==:#{@pulse-phase},1},#[bg=#74c7ec#,fg=#1e1e2e] #I:#W #[default],#[bg=#cba6f7#,fg=#1e1e2e] #I:#W #[default]},#[fg=#6c7086] #I:#W }"
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#89b4fa,bold] #I:#W #[fg=#89b4fa,bg=default]"

# Pane borders
set -g pane-border-style "fg=#6c7086"
set -g pane-active-border-style "fg=#74c7ec"

# Auto-clear pulse when switching to a window
set-hook -g pane-focus-in "set-window-option @claude-pulse off ; set-window-option @pulse-phase 0"

# Message style
set -g message-style "bg=#74c7ec,fg=#1e1e2e,bold"

# No bells
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none